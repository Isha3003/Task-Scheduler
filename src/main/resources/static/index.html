<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CPU Scheduling Simulator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>CPU Scheduling Simulator</h1>

    <!-- ================= CONTROL PANEL ================= -->

    <div class="card">

        <div class="row">

            <div class="field">

                <label>Scheduling Algorithm</label>

                <select id="algorithm">

                    <option value="FCFS">FCFS</option>

                    <option value="SJF">Shortest Job First</option>

                    <option value="ROUND_ROBIN">Round Robin</option>

                    <option value="PRIORITY">Priority Scheduling</option>

                </select>

            </div>

            <div class="field"
                 id="timeQuantumDiv"
                 style="display:none;">

                <label>Time Quantum</label>

                <input
                        type="number"
                        id="timeQuantum"
                        placeholder="Enter Time Quantum">

            </div>

        </div>

    </div>

    <!-- ================= PROCESS TABLE ================= -->

    <div class="card">

        <h2>Processes</h2>

        <table id="processTable">

            <thead>

            <tr>

                <th>Process ID</th>

                <th>Arrival Time</th>

                <th>Burst Time</th>

                <th id="priorityHeader"
                    style="display:none;">

                    Priority

                </th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="processBody">

            </tbody>

        </table>

        <div class="button-group">

            <button onclick="addProcess()">

                Add Process

            </button>

            <button onclick="runSimulation()">

                Run Simulation

            </button>

            <button onclick="resetSimulation()">

                Reset

            </button>

        </div>

    </div>

    <!-- ================= STATISTICS ================= -->

    <div class="card">

        <h2>Statistics</h2>

        <div class="stats">

            <div class="stat-card">

                <h3>Average Waiting Time</h3>

                <p id="avgWaiting">

                    0

                </p>

            </div>

            <div class="stat-card">

                <h3>Average Turnaround Time</h3>

                <p id="avgTurnaround">

                    0

                </p>

            </div>

            <div class="stat-card">

                <h3>CPU Utilization</h3>

                <p id="cpuUtilization">

                    0%

                </p>

            </div>

            <div class="stat-card">

                <h3>Throughput</h3>

                <p id="throughput">

                    0

                </p>

            </div>

        </div>

    </div>

    <!-- ================= RESULT TABLE ================= -->

    <div class="card">

        <h2>Simulation Result</h2>

        <table>

            <thead>

            <tr>

                <th>Process</th>

                <th>Arrival</th>

                <th>Burst</th>

                <th>Completion</th>

                <th>Turnaround</th>

                <th>Waiting</th>

                <th>Response</th>

            </tr>

            </thead>

            <tbody id="resultBody">

            </tbody>

        </table>

    </div>

    <!-- ================= GANTT CHART ================= -->

    <div class="card">

        <h2>Gantt Chart</h2>

        <div id="ganttChart">

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
